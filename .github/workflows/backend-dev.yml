name: Backend (dev) - build, push, deploy

# До 2026-09-16 Node 20 в раннерах GitHub Actions: см. opt-in / обновления actions
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    branches: [trunk]

concurrency:
  group: backend-dev-deploy
  cancel-in-progress: false

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/exact_hunter

      - name: Lint
        run: pnpm lint:ci

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test (no tests yet — passWithNoTests)
        run: pnpm test:ci

  docker:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ vars.DOCKER_IMAGE_BACKEND }}:dev
          build-args: |
            DATABASE_URL=postgresql://postgres:postgres@localhost:5432/exact_hunter

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to dev VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            cd ~/infra/dev/backend
            docker compose pull backend
            docker compose up -d exact-hunter-postgres
            docker compose run --rm --no-deps backend pnpm prisma:deploy
            docker compose up -d --force-recreate backend
            docker image prune -f

      - name: Smoke-check /health
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_HOST }}
          username: ${{ secrets.DEV_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            # Проверка внутри контейнера: на VPS curl к localhost:3001 часто даёт 000, если
            # порт не опубликован на host (другой compose/override) — при этом сервис внутри сети контейнера жив.
            retries=10
            delay=3
            for i in $(seq 1 $retries); do
              if docker exec exact-hunter-backend node -e "require('http').get('http://127.0.0.1:3001/health',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))" 2>/dev/null; then
                echo "Smoke-check passed (in-container /health) on attempt $i"
                exit 0
              fi
              echo "Attempt $i/$retries — in-container check failed, retrying in ${delay}s..."
              sleep $delay
            done
            echo "Smoke-check failed after $retries attempts"
            echo "--- docker port exact-hunter-backend ---"
            docker port exact-hunter-backend 2>&1 || true
            echo "--- Container logs (last 50 lines) ---"
            docker logs exact-hunter-backend --tail 50
            exit 1
