services:
  exact-hunter-postgres:
    container_name: exact-hunter-postgres
    image: postgres:18
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - 5432:5432
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - exactHunter

  exact-hunter-backend:
    container_name: exact-hunter-backend
    build: .
    restart: always
    networks:
      - exactHunter
    env_file:
      - .env
    ports:
      - 3001:3001
    depends_on:
      exact-hunter-postgres:
        condition: service_healthy

  prisma-studio:
    container_name: exact-hunter-prisma-studio
    build:
      context: .
      dockerfile: Dockerfile.prisma-studio
    env_file:
      - .env
    environment:
      # из контейнера Postgres доступен по имени сервиса, не localhost
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@exact-hunter-postgres:5432/${POSTGRES_DB:-postgres}
    ports:
      - 5555:5555
    depends_on:
      exact-hunter-postgres:
        condition: service_healthy
    networks:
      - exactHunter

networks:
  exactHunter:
    driver: bridge

volumes:
  postgres_data:
