services:
  postgres:
    container_name: postgres
    image: postgres:18
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - 5432:5432
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - exactHunter

  backend:
    container_name: backend
    build: .
    restart: always
    networks:
      - exactHunter
    env_file:
      - .env
    ports:
      - 3001:3001
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

networks:
  exactHunter:
    driver: bridge

volumes:
  postgres_data:
